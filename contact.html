<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M Travel - კონტაქტი</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <a href="#" class="brand">M Travel</a>

        <nav class="main-nav">
          <a href="index.html">მთავარი</a>
          <a href="routes.html">მიმართულებები</a>
          <a href="tours.html">ტურები</a>
          <a href="contact.html">კონტაქტი</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="contact-hero">
        <h1>კონტაქტი</h1>
        <p>დაგვიკავშირდით შემდეგი საშუალებებით</p>
      </section>

      <section class="contact-page-info">
        <div class="contact-details">
          <div class="contact-item">
            <h3>მისამართი</h3>
            <p>თბილისი, საქართველო</p>
          </div>

          <div class="contact-item">
            <h3>ტელეფონი</h3>
            <p>+995 123 456 789</p>
          </div>

          <div class="contact-item">
            <h3>ელ.ფოსტა</h3>
            <p>info@mtravel.ge</p>
          </div>
        </div>
        <div class="map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d23852.832687185528!2d42.97920211450913!3d41.642688461154734!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4042da8d2d3dd9a1%3A0x177cd54d58eb951b!2z4YOQ4YOu4YOQ4YOa4YOq4YOY4YOu4YOU!5e0!3m2!1ska!2sge!4v1775674581684!5m2!1ska!2sge"
            width="600"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </section>

      <section class="contact">
        <div class="contact-form">
          <h2>დაგვიკავშირდით</h2>
          <form>
            <input type="text" placeholder="სახელი" required />
            <input type="email" placeholder="ელ.ფოსტა" required />
            <textarea placeholder="შეტყობინება" required></textarea>
            <button type="submit" class="btn btn-primary">გაგზავნა</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <p>M Travel. ყველა უფლება დაცულია.</p>
        <div class="footer-info">
          <a href="index.html">მთავარი</a>
          <a href="routes.html">მიმართულებები</a>
          <a href="tours.html">ტურები</a>
          <a href="contact.html">კონტაქტი</a>
        </div>
      </div>
    </footer>
  </body>
</html>
